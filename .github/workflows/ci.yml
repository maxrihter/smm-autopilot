name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Install
        run: uv sync --extra dev
      - name: Lint + format check
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests
      - name: Type-check
        run: uv run mypy src
      - name: Test
        run: uv run pytest -q
      - name: Demo smoke (no API keys, no network)
        run: uv run smm-autopilot demo
